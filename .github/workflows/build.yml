name: Build Check

on:
  pull_request:
    branches:
      - main

  merge_group:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Display Event
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Branch: ${{ github.ref }}"
          echo "SHA: ${{ github.sha }}"

      - name: Simulate Build
        run: |
          echo "Building..."
          sleep 60

      - name: Read Build Control
        run: |
          STATUS=$(cat controls/build.txt)

          echo "Build Status = $STATUS"

          if [ "$STATUS" = "FAIL" ]; then
            echo "Build Failed"
            exit 1
          fi

          echo "Build Passed"
