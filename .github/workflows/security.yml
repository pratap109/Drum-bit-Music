name: Security Scan

on:
  pull_request:
    branches:
      - main

  merge_group:
    branches:
      - main

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Simulate Security Scan
        run: |
          echo "Running Security Scan..."
          sleep 60

      - name: Read Security Control
        run: |
          STATUS=$(cat controls/security.txt)

          echo "Security Status = $STATUS"

          if [ "$STATUS" = "FAIL" ]; then
            echo "Security Scan Failed"
            exit 1
          fi

          echo "Security Scan Passed"
